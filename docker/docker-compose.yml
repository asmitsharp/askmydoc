version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: askmydocs
      POSTGRES_PASSWORD: askmydocs
      POSTGRES_DB: askmydocs
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.14-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  qdrant_data:
  pg_data:
  redis_data:
