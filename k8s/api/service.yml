
apiVersion: v1
kind: Service
metadata:
  name: askmydocs-api-service
  namespace: askmydocs

  labels:
    app: askmydocs-api
spec:
  selector:
    app: askmydocs-api
  ports:
    - name: http       
      port: 80
      targetPort: 8080
    - name: metrics    
      port: 9090
      targetPort: 8080
  type: ClusterIP