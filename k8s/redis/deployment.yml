apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: askmydocs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
      metadata:
        labels:
          app: redis
      spec: 
        containers:
          - name: redis
            image: redis:7-alpine
            ports:
              - containerPort: 6379
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"

            livenessProbe:
              exec:
                command: ["redis-cli", "ping"]
              initialDelaySeconds: 15
              periodSeconds: 10
            readinessProbe:
              exec:
                command: ["redis-cli", "ping"]
              initialDelaySeconds: 10
              periodSeconds: 5
            
      