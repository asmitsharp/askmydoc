apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: askmydocs

spec:
  serviceName: qdrant-headless
  replicas: 1

  selector:
    matchLabels:
      app: qdrant

  template:
    metadata:
      labels:
        app: qdrant

    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.0

          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage

          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-data