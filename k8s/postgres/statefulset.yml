apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: askmydocs

spec:
  serviceName: postgres-headless
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine

          ports:
            - containerPort: 5432
              name: postgres

          env:
            - name: POSTGRES_USER
              value: "askmydocs"

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: askmydocs-secrets
                  key: DB_PASSWORD

            - name: POSTGRES_DB
              value: "askmydocs"

            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "askmydocs"]
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "askmydocs"]
            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data